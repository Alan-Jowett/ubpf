# MIPS64r6 cross-compilation and QEMU testing workflow.
# Uses clang + musl (static) to produce fully self-contained R6 binaries.
# This avoids the problem of Ubuntu's MIPS64 sysroot being pre-R6.

name: MIPS64

on:
  workflow_call:
    inputs:
      build_type:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: 'recursive'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ninja-build \
          cmake \
          clang \
          lld \
          llvm \
          qemu-user

    - name: Build musl libc for MIPS64r6
      run: |
        git clone --depth 1 https://git.musl-libc.org/git/musl musl-src
        cd musl-src
        CROSS_COMPILE='' CC="clang --target=mips64el-linux-musl -march=mips64r6 -fuse-ld=lld" \
          ./configure \
            --prefix=${{ github.workspace }}/musl-sysroot \
            --target=mips64el-linux-musl \
            --disable-shared
        make -j$(nproc) AR=llvm-ar RANLIB=llvm-ranlib
        make install

    - name: Build compiler-rt builtins for MIPS64r6
      run: |
        git clone --depth 1 --branch llvmorg-$(clang --version | grep -oP '\d+' | head -1).0.0 \
          --filter=blob:none --sparse \
          https://github.com/llvm/llvm-project.git llvm-sparse || \
        git clone --depth 1 --filter=blob:none --sparse \
          https://github.com/llvm/llvm-project.git llvm-sparse
        cd llvm-sparse
        git sparse-checkout set compiler-rt cmake

        cmake -G Ninja \
          -S compiler-rt/lib/builtins \
          -B build-builtins \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_ASM_COMPILER=clang \
          -DCMAKE_AR=$(which llvm-ar) \
          -DCMAKE_RANLIB=$(which llvm-ranlib) \
          -DCMAKE_C_COMPILER_WORKS=1 \
          -DCMAKE_ASM_COMPILER_WORKS=1 \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_C_FLAGS="--target=mips64el-linux-musl -march=mips64r6 --sysroot=${{ github.workspace }}/musl-sysroot -fPIC" \
          -DCMAKE_ASM_FLAGS="--target=mips64el-linux-musl -march=mips64r6 --sysroot=${{ github.workspace }}/musl-sysroot" \
          -DCMAKE_C_COMPILER_TARGET=mips64el-linux-musl \
          -DCOMPILER_RT_BAREMETAL_BUILD=ON \
          -DCOMPILER_RT_DEFAULT_TARGET_ONLY=ON

        ninja -C build-builtins
        cp build-builtins/lib/linux/libclang_rt.builtins-mips64el.a \
           ${{ github.workspace }}/musl-sysroot/lib/libclang_rt.builtins.a

    - name: Cross-compile ubpf for MIPS64r6
      run: |
        cmake \
          -G Ninja \
          -S . \
          -B build \
          -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE=cmake/mips64.cmake \
          -DCMAKE_SYSROOT=${{ github.workspace }}/musl-sysroot \
          -DUBPF_ENABLE_TESTS=true \
          -DUBPF_SKIP_EXTERNAL=true \
          -DUBPF_SKIP_CUSTOM_TESTS=true

        cmake --build build

    - name: Run tests via CTest (QEMU)
      run: |
        cd build
        ctest --output-on-failure
