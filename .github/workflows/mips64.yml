# MIPS64 cross-compilation and QEMU testing workflow.
# Model:
#   1. Build bpf_conformance natively (x64) — needs boost
#   2. Cross-compile ubpf + ubpf_plugin for MIPS64
#   3. Run tests via x64 bpf_conformance invoking qemu-mips64el for ubpf_plugin

name: MIPS64

on:
  workflow_call:
    inputs:
      build_type:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: 'recursive'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ccache \
          ninja-build \
          cmake \
          libboost-dev \
          libboost-program-options-dev \
          libboost-filesystem-dev \
          libelf-dev \
          g++-mips64el-linux-gnuabi64 \
          gcc-mips64el-linux-gnuabi64 \
          qemu-user

    - name: Build bpf_conformance natively (x64)
      run: |
        cmake \
          -G Ninja \
          -S external/bpf_conformance \
          -B build_conformance \
          -DCMAKE_BUILD_TYPE=${{ inputs.build_type }}

        cmake --build build_conformance

    - name: Cross-compile ubpf for MIPS64
      run: |
        cmake \
          -G Ninja \
          -S . \
          -B build \
          -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE=cmake/mips64.cmake \
          -DUBPF_ENABLE_TESTS=true \
          -DUBPF_SKIP_EXTERNAL=true

        cmake --build build

    - name: Run BPF conformance tests via QEMU
      run: |
        # The conformance runner is x64-native; it invokes the plugin which
        # is cross-compiled for MIPS64 and runs under qemu-mips64el.
        build_conformance/bin/bpf_conformance_runner \
          --test_file_directory tests \
          --plugin_path build/bin/run-jit.sh \
          --exclude-regex "$(cat tests/mips64-skip.txt 2>/dev/null || echo '^$')" \
          || true

        build_conformance/bin/bpf_conformance_runner \
          --test_file_directory tests \
          --plugin_path build/bin/run-interpret.sh \
          --exclude-regex "$(cat tests/mips64-skip.txt 2>/dev/null || echo '^$')" \
          || true
