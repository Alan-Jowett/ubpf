# MIPS64 cross-compilation and QEMU testing workflow.
# Cross-compiles ubpf for MIPS64, then runs tests via CTest with
# qemu-mips64el user-mode emulation (set up by CMake PREFIX/QEMU_RUNNER).

name: MIPS64

on:
  workflow_call:
    inputs:
      build_type:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: 'recursive'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ccache \
          ninja-build \
          cmake \
          libelf-dev \
          g++-mips64el-linux-gnuabi64 \
          gcc-mips64el-linux-gnuabi64 \
          qemu-user

    - name: Cross-compile ubpf for MIPS64
      run: |
        cmake \
          -G Ninja \
          -S . \
          -B build \
          -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE=cmake/mips64.cmake \
          -DUBPF_ENABLE_TESTS=true \
          -DUBPF_SKIP_EXTERNAL=true

        cmake --build build

    - name: Run tests via CTest (QEMU)
      run: |
        cd build
        ctest --output-on-failure
